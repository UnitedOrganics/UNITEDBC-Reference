<div class="container py-4">
  <h1>Checkout334</h1>
  <div id="checkoutLoading">Loading checkout...</div>
  <div id="checkoutEmpty" style="display: none;"><p>No active cart found.</p></div>
  <div id="checkoutContent" style="display: none;">
    <p><strong>Cart ID:</strong> <span id="cartIdText"></span></p>
    <table class="table">
      <thead>
        <tr>
          <th>Product</th>
          <th>Code</th>
          <th>Qty</th>
          <th>Price</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="checkoutTableBody">
        <tr class="row">
          <td class="cell"></td>
        </tr>
      </tbody>
    </table>
    <div class="text-end"><strong>Subtotal: </strong><span id="checkoutSubtotal">$0.00</span></div>
    <button id="placeOrderBtn" type="button" class="btn btn-primary mt-3">Place Order</button>
  </div>
</div>
<div class="row sectionBlockLayout text-start" style="display: flex; flex-wrap: wrap; margin: 0px; min-height: auto; padding: 8px;">
  <div class="container" style="padding: 0px; display: flex; flex-wrap: wrap;"><div class="col-lg-12 columnBlockLayout" style="flex-grow: 1; display: flex; flex-direction: column; min-width: 250px;"></div></div>
</div>
