{% assign token = user | antiforgerytoken %}

<form id="af-form" method="post">
  <input type="hidden" name="__RequestVerificationToken" value="{{ token }}" />
</form>

<script>
  // expose the token for JS callers
  window.__pp = window.__pp || {};
  window.__pp.antiForgery = "{{ token }}";
  console.log('AF token present?', !!window.__pp.antiForgery);
</script>

<p>Token wired. You can close this page.</p>
<div class="row sectionBlockLayout text-start" style="display: flex; flex-wrap: wrap; margin: 0px; min-height: auto; padding: 8px;">
  <div class="container" style="padding: 0px; display: flex; flex-wrap: wrap;"><div class="col-lg-12 columnBlockLayout" style="flex-grow: 1; display: flex; flex-direction: column; min-width: 250px;"></div></div>
</div>
